name: Release Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-installer:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
          python -m pip install pyinstaller

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest tests -q

      - name: Typecheck app
        working-directory: app
        run: npm run typecheck

      - name: Build backend executable
        working-directory: backend
        run: >
          pyinstaller
          --name kids_agent
          --onedir
          --noconfirm
          --collect-submodules kids_agent
          --collect-data kids_agent
          kids_agent\__main__.py

      - name: Build Windows installer
        working-directory: app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        # --publish never: build only. Upload is handled below (no GH_TOKEN needed for electron-builder).
        run: npm run dist:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: kids-desktop-agent-windows-installer
          path: |
            app/release/*.exe
            app/release/*.exe.blockmap
            app/release/latest.yml

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            app/release/*.exe
            app/release/*.exe.blockmap
            app/release/latest.yml
          body: |
            Windows beta installer.

            This build is unsigned unless code-signing secrets are configured.
            Download the Setup `.exe` from Assets below.
